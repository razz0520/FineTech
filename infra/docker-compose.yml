version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finetech
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    environment:
      FINETECH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finetech
      FINETECH_DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/finetech
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

  worker:
    build:
      context: ..
      dockerfile: infra/worker.Dockerfile
    environment:
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  db_data:

